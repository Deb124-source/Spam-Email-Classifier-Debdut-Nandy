<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spamify</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>Spamify</h1>

    <form action="/predict" method="post" class="card">
      <label for="message">Enter message:</label>
      <textarea id="message" name="message" rows="6" placeholder="Type or paste email message..." required></textarea>
      <button type="submit">Predict</button>
    </form>

    {% if prediction %}
      <div class="result card">
        <h2>{{ prediction }}</h2>
        <p class="typed">You typed: <strong>{{ input_message }}</strong></p>

      </div>
    {% endif %}


  </div>
  <script src="/static/script.js"></script>
</body>
</html>
